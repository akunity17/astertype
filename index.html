<style>
html, body {
  margin: 0;
  height: 100%;
  background: #ff2a00;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1200px;
}

/* contentor principal */
.scene {
  width: clamp(220px, 40vw, 420px);
  height: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(20px, 4vh, 60px);
  transform-style: preserve-3d;
}

/* mantém a tua perspectiva fixa */
.tilt {
  transform: rotateX(44deg) rotateY(31deg) rotateZ(-16deg) translateX(20px);
  transform-style: preserve-3d;
}


/* aqui roda todo o volume */
.extrude {
  position: relative;
  width: 16rem;
  aspect-ratio: 1 / 1;
  transform-style: preserve-3d;
  animation: cubic-bezier(0.66, 0, 0.34, 1) spin 2.5s infinite;
}
/* todas as estrelas sobrepostas */
.extrude img {
  position: absolute;
  width: 100%;
  height: auto;
  top: 0;
  left: 0;
}

/* camadas da extrusão */
.extrude img:nth-child(1) { transform: translateZ(0px)}
.extrude img:nth-child(2) { transform: translateZ(-84px)}

/* rotação no eixo local (já inclinado pela .tilt) */
@keyframes spin {
  from { transform: rotateZ(0deg); }
  to   { transform: rotateZ(360deg); }
}

.btn:active .front {

}

<script>
const MIN_TIME = 3000;
const startTime = Date.now();

fetch("preloader/preloader.html")
  .then(response => response.text())
  .then(data => {
    document.getElementById("preloader-container").innerHTML = data;
  });

window.addEventListener("load", () => {
  const elapsed = Date.now() - startTime;
  const remaining = Math.max(0, MIN_TIME - elapsed);

  setTimeout(() => {
    const preloader = document.getElementById("preloader");
    if (preloader) {
      preloader.style.transition = "opacity 0.8s ease";
      preloader.style.opacity = "0";

      setTimeout(() => {
        preloader.remove();
      }, 800);
    }
  }, remaining);
});
</script>
