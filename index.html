<style>
html, body {
  margin: 0;
  height: 100%;
  background: #FF1B1B;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1200px;
}

/* contentor principal */
.scene {
  width: clamp(220px, 40vw, 420px);
  height: auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(20px, 4vh, 60px);
  transform-style: preserve-3d;
}

/* mantém a tua perspectiva fixa */
.tilt {
  transform: rotateX(44deg) rotateY(31deg) rotateZ(-16deg) translateX(20px);
  transform-style: preserve-3d;
}


/* aqui roda todo o volume */
.extrude {
  position: relative;
  width: 16rem;
  aspect-ratio: 1 / 1;
  transform-style: preserve-3d;
  animation: cubic-bezier(0.66, 0, 0.34, 1) spin 2.5s infinite;
}
/* todas as estrelas sobrepostas */
.extrude img {
  position: absolute;
  width: 100%;
  height: auto;
  top: 0;
  left: 0;
}



/* rotação no eixo local (já inclinado pela .tilt) */
@keyframes spin {
  from { transform: rotateZ(0deg); }
  to   { transform: rotateZ(360deg); }
}


.extrude img:nth-of-type(1) { transform: translateZ(20px)}
