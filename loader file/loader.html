<title>Star 3D Extrusion</title>

<style>
html, body {
  margin: 0;
  height: 100%;
  background: #ff2a00;
  display: flex;
  align-items: center;
  justify-content: center;
  perspective: 1200px;
}

/* contentor principal */
.scene {
  width: 250px;
  height: 250px;
  transform-style: preserve-3d;
}

/* mantém a tua perspectiva fixa */
.tilt {
  transform: rotateX(44deg) rotateY(31deg) rotateZ(-16deg);
  transform-style: preserve-3d;
}


/* aqui roda todo o volume */
.extrude {
  position: relative;
  width: 200px;
  height: 200px;
  transform-style: preserve-3d;
  animation: cubic-bezier(0.66, 0, 0.34, 1) spin 2.5s infinite;
}

/* todas as estrelas sobrepostas */
.extrude img {
  position: absolute;
  width: 100%;
  height: auto;
  top: 0;
  left: 0;
}

/* camadas da extrusão */
.extrude img:nth-child(1) { transform: translateZ(0px)}
.extrude img:nth-child(2) { transform: translateZ(-84px)}

/* rotação no eixo local (já inclinado pela .tilt) */
@keyframes spin {
  from { transform: rotateZ(0deg); }
  to   { transform: rotateZ(360deg); }
}


.extrude img:nth-of-type(1) { transform: translateZ(-2px)}
